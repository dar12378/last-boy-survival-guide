<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Adventure</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111827;
      font-family: Arial, sans-serif;
      color: white;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(#60a5fa, #dbeafe 65%, #22c55e 65%);
    }

    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0,0,0,0.55);
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
    }

    .bossbar {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      background: rgba(0,0,0,0.75);
      border: 3px solid #dc2626;
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }

    .bossbar-title {
      color: #f87171;
      font-size: 22px;
      margin-bottom: 6px;
    }

    .bar {
      height: 24px;
      background: #374151;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #dc2626, #f87171);
      width: 100%;
      transition: width 0.2s;
    }

    .center-msg {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,0.65);
      text-align: center;
      pointer-events: auto;
    }

    button {
      font-size: 22px;
      padding: 12px 24px;
      border: 0;
      border-radius: 12px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<div class="overlay">
  <div class="hud">
    חיים: <span id="healthText">100</span><br>
    ניקוד: <span id="scoreText">0</span><br>
    חצים לזוז | רווח לתקוף
  </div>

  <div class="bossbar" id="bossBar">
    <div class="bossbar-title">דרקון האש</div>
    <div class="bar">
      <div class="bar-fill" id="bossFill"></div>
    </div>
    <div id="bossText">5000 / 5000</div>
  </div>

  <div class="center-msg" id="startScreen">
    <div>
      <h1>🐉 Dragon Adventure</h1>
      <p>הבס את הדרקון, התחמק מכדורי האש, ואסוף נקודות</p>
      <button onclick="startGame()">התחל משחק</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W, H, scale;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  scale = window.devicePixelRatio || 1;
  canvas.width = W * scale;
  canvas.height = H * scale;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.addEventListener("resize", resize);
resize();

const keys = {};
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

let running = false;
let gameOver = false;
let score = 0;
let bgOffset = 0;
let attackCooldown = 0;

const player = {
  x: 120,
  y: 0,
  w: 44,
  h: 64,
  vx: 0,
  vy: 0,
  speed: 5,
  jump: -13,
  onGround: false,
  health: 100
};

const boss = {
  x: 850,
  y: 150,
  w: 170,
  h: 120,
  health: 5000,
  maxHealth: 5000,
  frame: 0,
  phase: 0,
  timer: 0,
  fireballs: [],
  cooldown: 0
};

const coins = [];
for (let i = 0; i < 12; i++) {
  coins.push({
    x: 300 + i * 170,
    y: 420 - Math.sin(i) * 80,
    r: 12,
    taken: false
  });
}

function groundY() {
  return H * 0.78;
}

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  running = true;
  requestAnimationFrame(loop);
}

function rects(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

function update() {
  if (!running || gameOver) return;

  bgOffset += 0.25; // רקע זז לאט

  player.vx = 0;
  if (keys.ArrowLeft || keys.KeyA) player.vx = -player.speed;
  if (keys.ArrowRight || keys.KeyD) player.vx = player.speed;

  if ((keys.ArrowUp || keys.Space) && player.onGround) {
    player.vy = player.jump;
    player.onGround = false;
  }

  player.vy += 0.55;
  player.x += player.vx;
  player.y += player.vy;

  const gy = groundY();
  if (player.y + player.h > gy) {
    player.y = gy - player.h;
    player.vy = 0;
    player.onGround = true;
  }

  player.x = Math.max(0, Math.min(player.x, W - player.w));

  if (attackCooldown > 0) attackCooldown--;

  if (keys.Space && attackCooldown <= 0) {
    const sword = {
      x: player.x + player.w,
      y: player.y + 15,
      w: 55,
      h: 25
    };

    if (rects(sword, boss)) {
      boss.health = Math.max(0, boss.health - 120);
      score += 20;
    }

    attackCooldown = 18;
  }

  updateBoss();

  coins.forEach(c => {
    if (!c.taken) {
      const coinBox = {x: c.x, y: c.y, w: c.r * 2, h: c.r * 2};
      if (rects(player, coinBox)) {
        c.taken = true;
        score += 50;
      }
    }
  });

  if (boss.health <= 0) {
    score += 1000;
    gameOver = true;
    showEnd("ניצחת! הבסת את דרקון האש 🏆");
  }

  if (player.health <= 0) {
    gameOver = true;
    showEnd("הפסדת! הדרקון ניצח 🔥");
  }

  document.getElementById("healthText").textContent = player.health;
  document.getElementById("scoreText").textContent = score;
  document.getElementById("bossFill").style.width = (boss.health / boss.maxHealth * 100) + "%";
  document.getElementById("bossText").textContent = boss.health + " / " + boss.maxHealth;
}

function updateBoss() {
  boss.frame++;
  boss.timer++;
  if (boss.cooldown > 0) boss.cooldown--;

  if (boss.timer > 170) {
    boss.timer = 0;
    boss.phase = (boss.phase + 1) % 4;
  }

  const wave = Math.sin(boss.timer * 0.035) * 1.4;

  if (boss.phase === 0) boss.x += 1.2;
  if (boss.phase === 1) boss.x -= 1.2;
  if (boss.phase === 2) boss.y -= 0.8;
  if (boss.phase === 3) boss.y += 0.8;

  boss.y += wave;

  boss.x = Math.max(500, Math.min(boss.x, W - boss.w - 60));
  boss.y = Math.max(80, Math.min(boss.y, 310));

  if (boss.cooldown <= 0) {
    boss.fireballs.push({
      x: boss.x + 20,
      y: boss.y + 65,
      w: 32,
      h: 32,
      vx: -5.2,
      vy: Math.random() * 2.8 - 1.4
    });
    boss.cooldown = 70;
  }

  boss.fireballs.forEach(f => {
    f.x += f.vx;
    f.y += f.vy;

    if (rects(player, f)) {
      player.health = Math.max(0, player.health - 12);
      f.x = -999;
    }
  });

  boss.fireballs = boss.fireballs.filter(f => f.x > -100);
}

function drawBackground() {
  const gy = groundY();

  ctx.fillStyle = "#60a5fa";
  ctx.fillRect(0, 0, W, H);

  // clouds - slow background
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  for (let i = 0; i < 6; i++) {
    const x = ((i * 280 - bgOffset) % (W + 300)) - 150;
    const y = 70 + i % 3 * 55;
    ctx.beginPath();
    ctx.arc(x, y, 28, 0, Math.PI * 2);
    ctx.arc(x + 30, y - 10, 35, 0, Math.PI * 2);
    ctx.arc(x + 65, y, 26, 0, Math.PI * 2);
    ctx.fill();
  }

  // mountains
  ctx.fillStyle = "#64748b";
  for (let i = 0; i < 5; i++) {
    const x = i * 350 - (bgOffset * 0.2 % 350);
    ctx.beginPath();
    ctx.moveTo(x, gy);
    ctx.lineTo(x + 170, gy - 260);
    ctx.lineTo(x + 340, gy);
    ctx.closePath();
    ctx.fill();
  }

  // ground
  ctx.fillStyle = "#16a34a";
  ctx.fillRect(0, gy, W, H - gy);

  ctx.fillStyle = "#15803d";
  for (let i = 0; i < 80; i++) {
    const x = (i * 45 - bgOffset * 0.5) % (W + 50);
    ctx.fillRect(x, gy + 15, 20, 5);
  }
}

function drawPlayer() {
  ctx.save();

  // body
  ctx.fillStyle = "#2563eb";
  ctx.fillRect(player.x + 8, player.y + 25, 28, 35);

  // head
  ctx.fillStyle = "#fbbf24";
  ctx.beginPath();
  ctx.arc(player.x + 22, player.y + 15, 16, 0, Math.PI * 2);
  ctx.fill();

  // hair
  ctx.fillStyle = "#1f2937";
  ctx.fillRect(player.x + 8, player.y + 1, 28, 8);

  // eyes
  ctx.fillStyle = "#111";
  ctx.beginPath();
  ctx.arc(player.x + 17, player.y + 14, 2, 0, Math.PI * 2);
  ctx.arc(player.x + 28, player.y + 14, 2, 0, Math.PI * 2);
  ctx.fill();

  // legs
  ctx.fillStyle = "#1d4ed8";
  ctx.fillRect(player.x + 10, player.y + 58, 9, 22);
  ctx.fillRect(player.x + 26, player.y + 58, 9, 22);

  // sword attack
  if (attackCooldown > 8) {
    ctx.fillStyle = "#e5e7eb";
    ctx.fillRect(player.x + player.w, player.y + 27, 55, 8);
    ctx.fillStyle = "#92400e";
    ctx.fillRect(player.x + player.w - 5, player.y + 23, 8, 16);
  }

  ctx.restore();
}

function drawBoss() {
  const flap = Math.sin(boss.frame * 0.12) * 14;

  ctx.save();

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath();
  ctx.ellipse(boss.x + boss.w / 2, boss.y + boss.h + 20, 90, 20, 0, 0, Math.PI * 2);
  ctx.fill();

  // wings
  ctx.fillStyle = "#dc2626";
  ctx.strokeStyle = "#7f1d1d";
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.moveTo(boss.x + 40, boss.y + 50);
  ctx.quadraticCurveTo(boss.x - 70, boss.y + 20 + flap, boss.x - 35, boss.y + 105);
  ctx.quadraticCurveTo(boss.x + 5, boss.y + 80, boss.x + 40, boss.y + 55);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(boss.x + boss.w - 40, boss.y + 50);
  ctx.quadraticCurveTo(boss.x + boss.w + 70, boss.y + 20 + flap, boss.x + boss.w + 35, boss.y + 105);
  ctx.quadraticCurveTo(boss.x + boss.w - 5, boss.y + 80, boss.x + boss.w - 40, boss.y + 55);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // body
  ctx.fillStyle = "#ef4444";
  ctx.beginPath();
  ctx.ellipse(boss.x + 82, boss.y + 68, 75, 50, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // head
  ctx.fillStyle = "#dc2626";
  ctx.beginPath();
  ctx.arc(boss.x + 140, boss.y + 45, 36, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // eye
  ctx.fillStyle = "#fde68a";
  ctx.beginPath();
  ctx.arc(boss.x + 152, boss.y + 38, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#111";
  ctx.beginPath();
  ctx.arc(boss.x + 154, boss.y + 38, 4, 0, Math.PI * 2);
  ctx.fill();

  // horns
  ctx.fillStyle = "#78350f";
  ctx.beginPath();
  ctx.moveTo(boss.x + 125, boss.y + 15);
  ctx.lineTo(boss.x + 118, boss.y - 18);
  ctx.lineTo(boss.x + 138, boss.y + 10);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(boss.x + 150, boss.y + 15);
  ctx.lineTo(boss.x + 160, boss.y - 18);
  ctx.lineTo(boss.x + 164, boss.y + 15);
  ctx.closePath();
  ctx.fill();

  // tail
  ctx.strokeStyle = "#dc2626";
  ctx.lineWidth = 14;
  ctx.beginPath();
  ctx.moveTo(boss.x + 25, boss.y + 80);
  ctx.quadraticCurveTo(boss.x - 60, boss.y + 120, boss.x - 80, boss.y + 70);
  ctx.stroke();

  // spikes
  ctx.fillStyle = "#78350f";
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(boss.x + 35 + i * 22, boss.y + 28);
    ctx.lineTo(boss.x + 45 + i * 22, boss.y + 5);
    ctx.lineTo(boss.x + 55 + i * 22, boss.y + 30);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function drawFireballs() {
  boss.fireballs.forEach(f => {
    const g = ctx.createRadialGradient(
      f.x + f.w / 2,
      f.y + f.h / 2,
      0,
      f.x + f.w / 2,
      f.y + f.h / 2,
      f.w
    );
    g.addColorStop(0, "#fef3c7");
    g.addColorStop(0.5, "#f59e0b");
    g.addColorStop(1, "#dc2626");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(f.x + f.w / 2, f.y + f.h / 2, f.w / 2, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawCoins() {
  coins.forEach(c => {
    if (c.taken) return;

    ctx.fillStyle = "#facc15";
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#ca8a04";
    ctx.lineWidth = 3;
    ctx.stroke();
  });
}

function showEnd(text) {
  const div = document.getElementById("startScreen");
  div.style.display = "grid";
  div.innerHTML = `
    <div>
      <h1>${text}</h1>
      <p>ניקוד סופי: ${score}</p>
      <button onclick="location.reload()">שחק שוב</button>
    </div>
  `;
}

function draw() {
  drawBackground();
  drawCoins();
  drawBoss();
  drawFireballs();
  drawPlayer();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
